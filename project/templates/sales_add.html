{% extends "base.html" %}

{% block title %}Add Sale{% endblock title %}
{% block page_title %}Add Sale{% endblock page_title %}

{% block content %}

<style>
    .form-box {
        width: 55%;
        margin: 20px auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }

    button {
        margin-top: 20px;
        padding: 10px;
        width: 100%;
        background-color: #2980b9;
        color: white;
        border: none;
        border-radius: 5px;
    }
</style>

<div class="form-box">
    <form method="post">
        {% csrf_token %}

        <label>Invoice No</label>
        <input type="text" name="invoice_no" required>

        <label>Customer</label>
        <select name="customer" required>
            <option value="">Select Customer</option>
            {% for c in customers %}
            <option value="{{ c.id }}">{{ c.business_name }}</option>
            {% endfor %}
        </select>

        <label>Salesperson</label>
        <select name="salesperson" required>
            <option value="">Select Salesperson</option>
            {% for s in salespersons %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>

        <label>Product</label>
        <select name="product" required>
            <option value="">Select Product</option>
            {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>

        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>

        <label>Price Per Unit</label>
        <input type="number" step="0.01" name="price_per_unit" required>

        <label>Sale Date</label>
        <input type="date" name="sale_date" required>

        <label>Status</label>
        <select name="status">
            <option value="1">Completed</option>
            <option value="0">Cancelled</option>
        </select>

        <button type="submit">Save Sale</button>
    </form>
</div>

{% endblock content %}
