{% extends "base.html" %}

{% block title %}Add Target{% endblock %}
{% block page_title %}Add Target{% endblock %}

{% block content %}

<style>
.form-box {
    width: 450px;
    background: white;
    padding: 25px;
    margin: auto;
    border-radius: 12px;
    box-shadow: var(--shadow);
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
}

.save-btn {
    margin-top: 20px;
    width: 100%;
    background: #1976d2;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
}
</style>

<div class="form-box">
<form method="post">
    {% csrf_token %}

    <label>Salesperson</label>
    <select name="salesperson" required>
        <option value="">Select</option>
        {% for s in salespersons %}
        <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>

    <label>Product Category</label>
    <input type="text" name="product_category" required>

    <label>Month</label>
    <input type="number" name="month" min="1" max="12" required>

    <label>Year</label>
    <input type="number" name="year" required>

    <label>Target Type</label>
    <select name="target_type">
        <option value="value">Sales Value (₹)</option>
        <option value="quantity">Quantity</option>
    </select>

    <label>Target Value</label>
    <input type="number" name="target_value" required>

    <button type="submit" class="save-btn">Save Target</button>
</form>
</div>

{% endblock %}
