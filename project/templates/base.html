<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock title %}</title>

<style>
/* ================= ROOT THEME ================= */
:root {
    --primary: #2980b9;
    --primary-light: #5dade2;
    --accent: #1abc9c;

    --sidebar-bg: #004aad;
    --success: #2ecc71;
    --danger: #e74c3c;

    --card-bg: #ffffff;
    --border: #e5e7eb;
}

/* ================= GLOBAL ================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    color: #0e0116;
    background: #f5f7fb;
}

/* ================= LAYOUT ================= */
.dashboard {
    display: flex;
    min-height: 100vh;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 250px;
    background: var(--sidebar-bg);
    color: #ffffff;
    padding-top: 20px;
    box-shadow: 4px 0 15px rgba(0,0,0,0.15);
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 22px;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    margin: 6px 12px;
    color: #e5e7eb;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: var(--primary);
    color: #ffffff;
    transform: translateX(6px);
}

/* ================= MAIN CONTENT ================= */
.main-content {
    flex: 1;
    background: #f5f7fb;
    display: flex;
    flex-direction: column;
}

/* ================= TOPBAR ================= */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 26px;
    background: #ffffff;
    border-bottom: 1px solid var(--border);
}

.topbar-left h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    color: #1f2937;
}

/* NAVBAR BUTTON */
.nav-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #ffffff;
    padding: 10px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    white-space: nowrap;
}

.nav-btn:hover {
    opacity: 0.9;
}

/* ================= PAGE CONTENT ================= */
.page-content {
    padding: 26px;
    flex: 1;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
    .dashboard {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
    }

    .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}
</style>
</head>

<body>

<div class="dashboard">

    <!-- ========== SIDEBAR ========== -->
    <div class="sidebar">
        <h2>Sales Dashboard</h2>

        <a href="{% url 'home' %}">🏠 Dashboard</a>
        <a href="{% url 'customer_list' %}">👥 Customers</a>
        <a href="{% url 'salesperson_list' %}">🧑 Salesperson</a>
        <a href="{% url 'product_list' %}">📦 Products</a>
        <a href="{% url 'invoice_list' %}">🧾 Invoices</a>
        <a href="{% url 'target_setting' %}">🎯 Target Setting</a>
        <a href="{% url 'performance_analytics' %}">📊 Analysis</a>
    </div>

    <!-- ========== MAIN ========== -->
    <div class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="topbar-left">
                <h2>{% block page_title %}{% endblock page_title %}</h2>
            </div>

            <div class="topbar-right">
                {% block navbar_action %}{% endblock navbar_action %}
            </div>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page-content">
            {% block content %}{% endblock content %}
        </div>

    </div>

</div>

</body>
</html>
